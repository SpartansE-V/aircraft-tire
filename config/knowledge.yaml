# Document-grounding knowledge base — synthetic excerpts standing in for the real manuals.
# In production these are extracted from the actual AMM / MEL / CDL PDFs (traceable to a reference).

# --- AMM: the authoritative source for the thresholds the pipeline uses ---
amm:
  wear_limit_mm:
    value: 2.0
    ref: "AMM 32-45-11"
    text: "Remove the tire when tread is worn to the base of any groove; minimum serviceable groove depth 2.0 mm."
  cold_pressure_tolerance:
    ref: "AMM 12-14-31"
    text: "Maintain cold inflation pressure within -0 / +5% of the specified service pressure."
  pressure_action_ladder:
    ref: "AMM 32-45-00 / Goodyear Aircraft Tire Care"
    text: "95-100% reinflate; 90-95% inspect and reinflate; 80-90% remove; below 80% remove tire AND its mate."
  inspection_interval:
    ref: "AMM 05-20-11"
    text: "Inspect tread condition and cold pressure at each daily/transit check; thorough inspection after any hard landing."
  hard_removal_criteria:
    ref: "AMM 32-45-13"
    text: "Remove for a tread cut exposing cord, a sidewall bulge (separation), or FOD damage, regardless of remaining tread."

# --- MEL / CDL: dispatch relief (the AOG decision layer) ---
mel:
  tire_condition:
    mel_item: "—"
    dispatchable: false
    category: null
    interval_days: 0
    ref: "MEL 32-40 / AMM removal limits"
    provisions: "No dispatch relief — a tire worn to the limit or with acute damage must be replaced before dispatch."
  tpms_inop:
    mel_item: "MEL 32-45-02"
    dispatchable: true
    category: "C"
    interval_days: 10
    ref: "MEL 32-45-02"
    provisions: "Tyre pressure monitoring inoperative — verify cold pressures manually at each transit check."
  wheel_speed_sensor_inop:
    mel_item: "MEL 32-42-01"
    dispatchable: true
    category: "C"
    interval_days: 10
    ref: "MEL 32-42-01"
    provisions: "Anti-skid degraded — apply landing-distance factor; maximum one inoperative per gear."

cdl:
  gear_door_seal:
    cdl_item: "CDL 52-1"
    dispatchable: true
    penalty: "0.2% MTOW / 1 kt cruise"
    ref: "CDL 52-1"
    text: "Dispatch permitted with a missing main-gear door seal segment; a performance penalty applies."

# MEL rectification-interval categories (calendar).
category_intervals:
  A: "per remarks (typically 1-3 days)"
  B: "3 calendar days"
  C: "10 calendar days"
  D: "120 calendar days"

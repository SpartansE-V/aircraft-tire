name: Deploy to ECS

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch: {}

permissions:
  id-token: write # required for OIDC -> AWS role assumption
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: aircraft-tire
  TF_VAR_image_tag: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync

      - name: Verify dependency lock
        run: uv lock --check

      - name: Check formatting
        run: uv run ruff format --check app tests

      - name: Lint application and tests
        run: uv run ruff check app tests

      - name: Type-check application
        run: uv run mypy app

      - name: Verify model evidence and calibration contracts
        run: >-
          uv run pytest
          tests/test_model_registry.py
          tests/test_calibration_dataset.py
          tests/test_calibration_validation.py
          tests/test_physical_benchmark.py
          -q

      - name: Run test suite
        run: uv run pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" .
          docker push "$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      - name: Publish endpoint to job summary
        working-directory: infra
        run: |
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "Public endpoint: $(terraform output -raw alb_dns_name)" >> "$GITHUB_STEP_SUMMARY"

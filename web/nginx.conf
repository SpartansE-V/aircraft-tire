server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Proxy /api requests to the FastAPI backend service
    location /api/ {
        proxy_pass ${API_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mock tyre scan images are served by the API (local disk or S3), not the web bundle.
    # Must be before /assets/ so hashed Vite files still use try_files below.
    location /assets/mock-tyres/ {
        proxy_pass ${API_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Vite hashed static assets — serve from the nginx root, don't fall back to index.html
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routes - fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

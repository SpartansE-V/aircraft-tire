[pytest]
# The app's test suite lives at <repo>/tests but imports the repo-root `app` package,
# so pytest's rootdir must be the repo root (not app/). Keeping this config here — rather
# than in app/pyproject.toml — means `uv run pytest ../tests` (CI) and `uv run pytest`
# (make test, from app/) both discover it and put the repo root on sys.path via pythonpath.
# The sibling projects (3d-reconstructor/, gradio-app/) carry their own pytest.ini so they
# keep their own rootdir and are unaffected by this one.
pythonpath = .
testpaths = tests
addopts = -ra
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "treadcast"
version = "0.1.0"
description = "Aircraft Tire Remaining Useful Life (RUL) prediction POC"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# UP042: (str, enum.Enum) is intentional — enum .value serializes cleanly to Parquet/JSON.
ignore = ["E501", "UP042"]
